<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="Game.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="Game">
        <button onclick="playGame('rock'); Stats()"> 
            <img src="Rock.jpeg" alt="Rock"> 
        </button>
        <button onclick="playGame('paper'); Stats()"> 
            <img src="Paper.jpeg" alt="Paper"> 
        </button>
        <button onclick="playGame('scissor'); Stats()"> 
            <img src="Scissor.jpeg" alt="Scissor"> 
        </button>
    </div> 
    <p id="matter"></p>
    <p id="result"></p>
    <p id="output">Won: 0 | Loss: 0 | Tie: 0</p>   
    <button onclick="reset()" class="Reset-button"> Reset </button>
    <button onclick="autoplay()" class="AutoPlay-button"> AutoPlay </button>
    <script src="ShowQuantity.js"></script>
    
</body>
</html>
